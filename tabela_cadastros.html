<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>claex — Cadastros</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    #side-menu {
      position: fixed;
      top: 0; left: -240px;
      width: 240px; height: 100vh;
      background: #1a237e;
      display: flex; flex-direction: column;
      padding: 24px 0; gap: 4px;
      transition: left 0.3s ease;
      z-index: 200;
    }
    #side-menu.open { left: 0; }

    .side-brand {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 3px;
      padding: 0 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 8px;
    }

    .side-link {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      padding: 11px 24px;
      font-size: 14px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .side-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .side-link.active { background: rgba(255,255,255,0.15); color: #fff; }

    /* ── OVERLAY ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 199;
    }
    .overlay.open { display: block; }

    /* ── HEADER ── */
    header {
      background: #1a237e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .bars {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
    }
    .menu-bar {
      width: 22px; height: 2px;
      background: #fff;
      border-radius: 2px;
    }

    .header-title {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .header-btns {
      display: flex;
      gap: 8px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
    }

    .btn-solid {
      background: #fff;
      border: none;
      color: #1a237e;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
    }

    /* ── PAGE ── */
    .page {
      padding: 32px 28px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: bold;
      color: #2c3e50;
    }

    .page-header p {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr { background: #1a237e; }

    thead th {
      color: #fff;
      padding: 13px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7f9fc; }

    tbody td {
      padding: 12px 16px;
      color: #2c3e50;
    }

    .id-cell { color: #999; font-size: 13px; }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      text-transform: capitalize;
    }
    .badge-escola    { background: #E6F1FB; color: #0C447C; }
    .badge-professor { background: #E1F5EE; color: #085041; }
    .badge-aluno     { background: #EEEDFE; color: #3C3489; }

    /* ── ACTION BUTTONS ── */
    .btn-action {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn-edit   { color: #185FA5; }
    .btn-edit:hover   { background: #E6F1FB; }
    .btn-delete { color: #A32D2D; }
    .btn-delete:hover { background: #FCEBEB; }

    /* ── EMPTY / LOADING STATE ── */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
      color: #999;
    }
    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .empty-state p {
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <!-- SIDEBAR -->
  <nav id="side-menu">
    <div class="side-brand">CLAEX</div>
    <a href="index.html" class="side-link">🏠 Início</a>
    <a href="form_login.html" class="side-link">🔑 Login</a>
    <a href="listar_sala.html" class="side-link">📚 Salas</a>
    <a href="form_nova_sala.html" class="side-link">➕ Nova sala</a>
    <a href="config_sala.html" class="side-link">⚙️ Config sala</a>
    <a href="tabela_cadastros.html" class="side-link active">👥 Tabela de profs</a>
  </nav>



  <!-- PAGE -->
  <div class="page">
    <div class="page-header">
      <h1>Cadastros</h1>
      <p>Lista de usuários cadastrados na plataforma</p>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Tipo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabelaCadastro">
            <tr>
              <td colspan="5">
                <div class="empty-state">
                  <div class="icon">⏳</div>
                  <p>Carregando cadastros...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ── SIDEBAR TOGGLE ──
    const menuToggle = document.getElementById("menuToggle");
    const sideMenu   = document.getElementById("side-menu");
    const overlay    = document.getElementById("overlay");

    menuToggle.addEventListener("click", () => {
      sideMenu.classList.toggle("open");
      overlay.classList.toggle("open");
    });
    overlay.addEventListener("click", () => {
      sideMenu.classList.remove("open");
      overlay.classList.remove("open");
    });

    // ── API ──
    const api = "https://lolooo-production.up.railway.app/form_cadastro-html";

    function badgeClass(tipo) {
      if (tipo === "escola")    return "badge-escola";
      if (tipo === "professor") return "badge-professor";
      return "badge-aluno";
    }

    // ── LISTAR ──
    async function listarCadastros() {
      const tabela = document.getElementById("tabelaCadastro");
      try {
        const response = await fetch(api + "/listar");
        if (!response.ok) throw new Error("Erro " + response.status);
        const cadastros = await response.json();

        if (!cadastros.length) {
          tabela.innerHTML = `
            <tr><td colspan="5">
              <div class="empty-state">
                <div class="icon">👤</div>
                <p>Nenhum cadastro encontrado.</p>
              </div>
            </td></tr>`;
          return;
        }

        tabela.innerHTML = cadastros.map(c => `
          <tr>
            <td class="id-cell">#${c.id}</td>
            <td><strong>${c.nome}</strong></td>
            <td style="color:#555;">${c.email}</td>
            <td><span class="badge ${badgeClass(c.tipo)}">${c.tipo}</span></td>
            <td style="text-align:right;">
              <button class="btn-action btn-edit"   onclick="editarCadastro(${c.id})">✏️ Editar</button>
              <button class="btn-action btn-delete" onclick="excluirCadastro(${c.id})">🗑️ Excluir</button>
            </td>
          </tr>
        `).join("");

      } catch (e) {
        tabela.innerHTML = `
          <tr><td colspan="5">
            <div class="empty-state">
              <div class="icon">❌</div>
              <p>Erro ao conectar com o servidor.</p>
            </div>
          </td></tr>`;
      }
    }

    // ── EXCLUIR ──
    async function excluirCadastro(id) {
      if (!confirm("Deseja excluir este cadastro?")) return;
      try {
        await fetch(`${api}/${id}`, { method: "DELETE" });
        listarCadastros();
      } catch (e) {
        alert("Erro ao excluir.");
      }
    }

    // ── EDITAR ──
    function editarCadastro(id) {
      window.location.href = `form_cadastro.html?id=${id}`;
    }

    listarCadastros();
  </script>

</body>
</html>
