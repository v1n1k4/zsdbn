<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>claex — Cadastros</title>
  

 
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <!-- SIDEBAR -->
  <nav id="side-menu">
    <div class="side-brand">CLAEX</div>
    <a href="index.html" class="side-link">🏠 Início</a>
    <a href="form_login.html" class="side-link">🔑 Login</a>
    <a href="listar_sala.html" class="side-link">📚 Salas</a>
    <a href="form_nova_sala.html" class="side-link">➕ Nova sala</a>
    <a href="config_sala.html" class="side-link">⚙️ Config sala</a>
    <a href="tabela_cadastros.html" class="side-link">👥 Tabela de profs</a>
  </nav>

  <!-- botão hamburguer flutuante para abrir sidebar -->
  <button id="menuToggle" style="position:fixed;top:14px;left:16px;z-index:150;background:#1a237e;border:none;cursor:pointer;padding:8px;border-radius:6px;display:flex;flex-direction:column;gap:5px;">
    <div class="menu-bar"></div>
    <div class="menu-bar"></div>
    <div class="menu-bar"></div>
  </button>

  <!-- PAGE -->
  <div class="page">
    <div class="page-header">
      <h1>Cadastros</h1>
      <p>Lista de usuários cadastrados na plataforma</p>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Tipo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabelaCadastro">
            <tr>
              <td colspan="5">
                <div class="empty-state">
                  <div class="icon">⏳</div>
                  <p>Carregando cadastros...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ── SIDEBAR TOGGLE ──
    const menuToggle = document.getElementById("menuToggle");
    const sideMenu   = document.getElementById("side-menu");
    const overlay    = document.getElementById("overlay");

    menuToggle.addEventListener("click", () => {
      sideMenu.classList.toggle("open");
      overlay.classList.toggle("open");
    });
    overlay.addEventListener("click", () => {
      sideMenu.classList.remove("open");
      overlay.classList.remove("open");
    });

    // ── API ──
    const api = "https://lolooo-production.up.railway.app/form_cadastro-html";

    function badgeClass(tipo) {
      if (tipo === "escola")    return "badge-escola";
      if (tipo === "professor") return "badge-professor";
      return "badge-aluno";
    }

    // ── LISTAR ──
    async function listarCadastros() {
      const tabela = document.getElementById("tabelaCadastro");
      try {
        const response = await fetch(api + "/listar");
        if (!response.ok) throw new Error("Erro " + response.status);
        const cadastros = await response.json();

        if (!cadastros.length) {
          tabela.innerHTML = `
            <tr><td colspan="5">
              <div class="empty-state">
                <div class="icon">👤</div>
                <p>Nenhum cadastro encontrado.</p>
              </div>
            </td></tr>`;
          return;
        }

        tabela.innerHTML = cadastros.map(c => `
          <tr>
            <td class="id-cell">#${c.id}</td>
            <td><strong>${c.nome}</strong></td>
            <td style="color:#555;">${c.email}</td>
            <td><span class="badge ${badgeClass(c.tipo)}">${c.tipo}</span></td>
            <td style="text-align:right;">
              <button class="btn-action btn-edit"   onclick="editarCadastro(${c.id})">✏️ Editar</button>
              <button class="btn-action btn-delete" onclick="excluirCadastro(${c.id})">🗑️ Excluir</button>
            </td>
          </tr>
        `).join("");

      } catch (e) {
        tabela.innerHTML = `
          <tr><td colspan="5">
            <div class="empty-state">
              <div class="icon">❌</div>
              <p>Erro ao conectar com o servidor.</p>
            </div>
          </td></tr>`;
      }
    }

    // ── EXCLUIR ──
    async function excluirCadastro(id) {
      if (!confirm("Deseja excluir este cadastro?")) return;
      try {
        await fetch(`${api}/${id}`, { method: "DELETE" });
        listarCadastros();
      } catch (e) {
        alert("Erro ao excluir.");
      }
    }

    // ── EDITAR ──
    function editarCadastro(id) {
      window.location.href = `form_cadastro.html?id=${id}`;
    }

    listarCadastros();
  </script>

</body>
</html>
