<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/style.css">
  <title>claex — Cadastros</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background-color: #f0f2f5; min-height: 100vh; }

   
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 199; }
    .overlay.open { display: block; }

    #menuToggle { position: fixed; top: 14px; left: 16px; z-index: 100; background: #5765ff; border: none; cursor: pointer; padding: 9px; border-radius: 5px; display: flex; flex-direction: column; gap: 5px; }
    .menu-bar { width: 20px; height: 2px; background: #fff; border-radius: 2px; }

    .page { padding: 64px 28px 32px; max-width: 1100px; margin: 0 auto; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 22px; font-weight: bold; color: #2c3e50; }
    .page-header p  { font-size: 14px; color: #666; margin-top: 4px; }

    .card { background: #fff; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.08); overflow: hidden; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead tr { background: #1a237e; }
    thead th { color: #fff; padding: 13px 16px; text-align: left; font-weight: 600; font-size: 13px; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7f9fc; }
    tbody td { padding: 12px 16px; color: #2c3e50; }
    .id-cell { color: #999; font-size: 13px; }

    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: 20px; text-transform: capitalize; }
    .badge-escola    { background: #E6F1FB; color: #0C447C; }
    .badge-professor { background: #E1F5EE; color: #085041; }
    .badge-aluno     { background: #EEEDFE; color: #3C3489; }

    .btn-action { background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; padding: 5px 12px; border-radius: 6px; transition: background 0.15s; }
    .btn-edit   { color: #185FA5; }
    .btn-edit:hover   { background: #E6F1FB; }
    .btn-delete { color: #A32D2D; }
    .btn-delete:hover { background: #FCEBEB; }

    .empty-state { text-align: center; padding: 56px 24px; color: #999; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; display: block; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 500; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: 100%; max-width: 440px; margin: 16px; animation: slideUp 0.25s ease; overflow: hidden; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-header { background: #1a237e; color: #fff; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 22px; cursor: pointer; line-height: 1; transition: color 0.15s; }
    .modal-close:hover { color: #fff; }

    .modal-body { padding: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 14px; color: #2c3e50; transition: border 0.2s; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #1a237e; }

    .modal-footer { padding: 16px 24px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid #f0f0f0; }
    .btn-cancelar { padding: 9px 20px; border-radius: 7px; border: 1.5px solid #ddd; background: #fff; color: #555; font-size: 14px; cursor: pointer; transition: background 0.15s; }
    .btn-cancelar:hover { background: #f5f5f5; }
    .btn-salvar { padding: 9px 24px; border-radius: 7px; border: none; background: #1a237e; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-salvar:hover { background: #151b60; }
    .btn-salvar:disabled { background: #8e9bc0; cursor: not-allowed; }

    .modal-confirm .modal-header { background: #7f1d1d; }
    .modal-confirm .modal-body { text-align: center; padding: 32px 24px; }
    .confirm-icon { font-size: 48px; display: block; margin-bottom: 12px; }
    .confirm-text { font-size: 15px; color: #2c3e50; margin-bottom: 4px; font-weight: 600; }
    .confirm-sub  { font-size: 13px; color: #888; }
    .btn-excluir { padding: 9px 24px; border-radius: 7px; border: none; background: #A32D2D; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-excluir:hover { background: #7f1d1d; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a237e; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .toast.erro  { background: #A32D2D; }
  </style>
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <nav id="side-menu">
    <div class="side-brand"></div>
    <a href="index.html"            class="side-link">🏠 Início</a>
    <a href="form_login.html"       class="side-link">🔑 Login</a>
    <a href="listar_sala.html"      class="side-link">📚 Salas</a>
    <a href="form_nova_sala.html"   class="side-link">➕ Nova sala</a>
    <a href="config_sala.html"      class="side-link">⚙️ Config sala</a>
    <a href="tabela_cadastros.html" class="side-link active">👥 Tabela de profs</a>
  </nav>

  <button id="menuToggle">
    <div class="menu-bar"></div>
    <div class="menu-bar"></div>
    <div class="menu-bar"></div>
  </button>

  <div class="page">
    <div class="page-header">
      <h1>Cadastros</h1>
      <p>Lista de usuários cadastrados na plataforma</p>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Nome</th><th>E-mail</th><th>Tipo</th><th>Senha</th><th></th>
            </tr>
          </thead>
          <tbody id="tabelaCadastro">
            <tr><td colspan="5"><div class="empty-state"><span class="icon">⏳</span>Carregando...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL EDIÇÃO -->
  <div class="modal-overlay" id="modalEdicao">
    <div class="modal">
      <div class="modal-header">
        <h2>✏️ Editar Cadastro</h2>
        <button class="modal-close" onclick="fecharModal('modalEdicao')">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="editNome" placeholder="Nome completo">
        </div>
        <div class="form-group">
          <label>Nova Senha</label>
          <input type="password" id="editSenha" placeholder="Digite a nova senha">
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="editTipo">
            <option value="aluno">Aluno</option>
            <option value="professor">Professor</option>
            <option value="escola">Escola</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancelar" onclick="fecharModal('modalEdicao')">Cancelar</button>
        <button class="btn-salvar" id="btnSalvar" onclick="salvarEdicao()">Salvar Alterações</button>
      </div>
    </div>
  </div>

  <!-- MODAL EXCLUSÃO -->
  <div class="modal-overlay" id="modalExclusao">
    <div class="modal modal-confirm">
      <div class="modal-header">
        <h2>🗑️ Confirmar Exclusão</h2>
        <button class="modal-close" onclick="fecharModal('modalExclusao')">×</button>
      </div>
      <div class="modal-body">
        <span class="confirm-icon">⚠️</span>
        <p class="confirm-text">Deseja excluir este cadastro?</p>
        <p class="confirm-sub">Esta ação não pode ser desfeita.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancelar" onclick="fecharModal('modalExclusao')">Cancelar</button>
        <button class="btn-excluir" id="btnExcluir" onclick="confirmarExclusao()">Sim, excluir</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = "https://lolooo-production.up.railway.app/form_cadastro-html";
    let idParaExcluir = null;

    // SIDEBAR
    document.getElementById("menuToggle").addEventListener("click", () => {
      document.getElementById("side-menu").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("open");
    });
    document.getElementById("overlay").addEventListener("click", () => {
      document.getElementById("side-menu").classList.remove("open");
      document.getElementById("overlay").classList.remove("open");
    });

    // TOAST
    function showToast(msg, erro = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show" + (erro ? " erro" : "");
      setTimeout(() => t.className = "toast", 3000);
    }

    // MODAL
    function abrirModal(id)  { document.getElementById(id).classList.add("open"); }
    function fecharModal(id) { document.getElementById(id).classList.remove("open"); }
    document.querySelectorAll(".modal-overlay").forEach(el => {
      el.addEventListener("click", e => { if (e.target === el) el.classList.remove("open"); });
    });

    function badgeClass(tipo) {
      if (tipo === "escola")    return "badge-escola";
      if (tipo === "professor") return "badge-professor";
      return "badge-aluno";
    }

    // LISTAR
    async function listarCadastros() {
      const tabela = document.getElementById("tabelaCadastro");
      try {
        const res = await fetch(API + "/listar");
        if (!res.ok) throw new Error();
        const dados = await res.json();
        if (!dados.length) {
          tabela.innerHTML = `<tr><td colspan="5"><div class="empty-state"><span class="icon">👤</span>Nenhum cadastro encontrado.</div></td></tr>`;
          return;
        }
        tabela.innerHTML = dados.map(c => `
          <tr>
            <td class="id-cell">#${c.id}</td>
            <td><strong>${c.nome}</strong></td>
            <td style="color:#555;">${c.email}</td>
            <td><span class="badge ${badgeClass(c.tipo)}">${c.tipo}</span></td>
            <td>
              <span class="senha-oculta" id="senha-${c.id}">••••••••</span>
              <button class="btn-action" style="color:#888;font-size:12px;" onclick="toggleVerSenha(${c.id},'${c.senha}')">👁️</button>
            </td>
            <td style="text-align:right;">
              <button class="btn-action btn-edit" onclick="abrirEdicao(${c.id},'${c.nome}','${c.tipo}')">✏️ Editar</button>
              <button class="btn-action btn-delete" onclick="abrirExclusao(${c.id})">🗑️ Excluir</button>
            </td>
          </tr>`).join("");
      } catch {
        tabela.innerHTML = `<tr><td colspan="5"><div class="empty-state"><span class="icon">❌</span>Erro ao conectar com o servidor.</div></td></tr>`;
      }
    }

    // EDITAR
    function abrirEdicao(id, nome, tipo) {
      document.getElementById("editId").value    = id;
      document.getElementById("editNome").value  = nome;
      document.getElementById("editSenha").value = "";
      document.getElementById("editTipo").value  = tipo;
      abrirModal("modalEdicao");
    }

    async function salvarEdicao() {
      const id    = document.getElementById("editId").value;
      const nome  = document.getElementById("editNome").value.trim();
      const senha = document.getElementById("editSenha").value.trim();
      const tipo  = document.getElementById("editTipo").value;
      if (!nome)  { showToast("Preencha o nome.", true); return; }
      if (!senha) { showToast("Preencha a nova senha.", true); return; }
      const btn = document.getElementById("btnSalvar");
      btn.disabled = true; btn.textContent = "Salvando...";
      try {
        const res = await fetch(`${API}/atualizar/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ nome, senha, tipo })
        });
        if (!res.ok) throw new Error();
        fecharModal("modalEdicao");
        showToast("✅ Cadastro atualizado!");
        listarCadastros();
      } catch { showToast("Erro ao atualizar.", true); }
      finally { btn.disabled = false; btn.textContent = "Salvar Alterações"; }
    }

    // EXCLUIR
    function abrirExclusao(id) {
      idParaExcluir = id;
      abrirModal("modalExclusao");
    }

    async function confirmarExclusao() {
      const btn = document.getElementById("btnExcluir");
      btn.disabled = true; btn.textContent = "Excluindo...";
      try {
        const res = await fetch(`${API}/deletar/${idParaExcluir}`, { method: "DELETE" });
        if (!res.ok) throw new Error();
        fecharModal("modalExclusao");
        showToast("✅ Cadastro excluído!");
        listarCadastros();
      } catch { showToast("Erro ao excluir.", true); }
      finally { btn.disabled = false; btn.textContent = "Sim, excluir"; idParaExcluir = null; }
    }

    function toggleVerSenha(id, senha) {
      const el = document.getElementById("senha-" + id);
      el.textContent = el.textContent === "••••••••" ? senha : "••••••••";
    }

    // inicia
    listarCadastros();
  </script>
</body>
</html>
