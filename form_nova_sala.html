    <section>
        
        <form id="form_nova_sala">
            <article class="flex_colunm">

            <input type="hidden" id="id">
            <input type="hidden" id="id_escola" value=1>
            <label>Nome da sala: <input type="text" id="nome" placeholder="Nome da sala"></label><br>
            <label>Duração de uma aula: <input type="number" id="duracao_aula" placeholder="50"></label><br>
            <label>Duração do intervalo: <input type="number" id="duracao_intervalo" placeholder="20"></label>
            <label>Hora que começa a aula <input type="time" id="inicio_aula"></label>
            <label>Quantidade de aulas por dia<input type="number" id="quant_aulas" placeholder="6"></label>

            </article>
            <article>
                <div>
                    <h3 onclick="addMateria()">Adicionar matéria +</h3>
                    <div id="aulas">
                    <!-- <label>Matéria: <input type="text"></label>
                    <label>Professor: <input type="text"></label> -->
                    </div>

                    <script>
                        async function addMateria(){
                            const buscaMaterias = await fetch("https://lolooo-production.up.railway.app/materias/listar");
                            const materias = await buscaMaterias.json();
                            
                            const buscaProfessores = await fetch("https://lolooo-production.up.railway.app/professores/listar");
                            const professores = await buscaProfessores.json();

                            let aulas = document.getElementById("aulas");
                            
                            aulas.insertAdjacentHTML('beforeend',`
                            <div class="aulas">
                                <label>Matéria: 
                                    <select class="materia" placeholder="Escolha uma materia">
                                        <option value="" selected disable>Escolha uma materia</option>
                                ${materias
                                    .map(materia => `
                                        <option value=${materia.id_materia}>
                                            ${materia.nome_materia}
                                        </option>
                                    `)
                                    .join('')}
                                </select></label>
                                <label>Professor: 
                                    <select class="professor">
                                        <option value="null">Escolha um professor</option>
                                ${professores
                                    .map(professor => `
                                        <option value=${professor.id_professor}>
                                            ${professor.nome_professor}
                                        </option>
                                    `)
                                    .join('')}
                                </select></label>
                            </div>
                            `);
                        }
                    </script>
                    
                </div>
            </article>
            <button type="submit" class="submit">Criar sala</button>
        </form>

        <script>
            const api = "https://lolooo-production.up.railway.app/salas/salvar";
            
            document.getElementById("form_nova_sala").addEventListener("submit", async function(e) {
                e.preventDefault();

                const id = document.getElementById("id").value

                const sala = {
                    nome_sala: document.getElementById("nome").value,
                    duracao_aula: document.getElementById("duracao_aula").value,
                    duracao_intervalo: document.getElementById("duracao_intervalo").value,
                    inicio_aula: document.getElementById("inicio_aula").value,
                    quant_aula: document.getElementById("quant_aulas").value,
                    escola: {
                        id: document.getElementById("id_escola").value
                    }
                }

                if(id === ""){
                    const response = await fetch(api, {
                        method: "POST",
                        headers: {
                            "Content-type": "application/json"
                        },
                        body: JSON.stringify(sala)
                    });
                    if(response.status === 200){
                        alert("Sala criada com sucesso");

                        let materias = [];
                        let aulas = document.querySelectorAll(".aulas");
                        aulas.forEach((aula) => {
                            materias.push({
                                id_materia: {id_materia: aula.querySelector(".materia").value},
                                id_professor: {id_professor: aula.querySelector(".professor").value}
                            })
                        })

                        console.log(materias)

                        const id_sala = await response.json();

                        const responseGrade = await fetch(`https://lolooo-production.up.railway.app/grade/gerargrade/${id_sala.id_sala}`, {
                            method: "POST",
                            headers: {
                                "Content-type": "application/json"
                            },
                            body: JSON.stringify(materias)
                        });

                        if(responseGrade.ok){
                            alert("grade criada com sucesso");
                        } else{
                            alert("Erro ao criar grade");
                        }

                        <!-- window.location.href = "listar_sala.html"; -->
                    } else {
                        alert("Ocorreu um erro, tente novamente")
                    }
                }



            })
        </script>
